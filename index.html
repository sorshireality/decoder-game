<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F4A261" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Decoder" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Color Decoder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen active">
    <button id="lang-toggle" class="lang-toggle">UA</button>
    <div class="color-preview"></div>
    <h1 class="app-title">Color<span>Decoder</span></h1>
    <p id="app-subtitle" class="app-subtitle"></p>
    <div class="home-actions">
      <button id="btn-play" class="btn-primary"></button>
      <button id="btn-pvp" class="btn-secondary home-secondary-btn">PVP (MVP)</button>
    </div>
  </div>

  <!-- PVP LOBBY SCREEN -->
  <div id="pvp-screen" class="screen">
    <div class="screen-header">
      <button id="btn-back-pvp" class="btn-back">←</button>
      <h2 id="pvp-title">PVP</h2>
      <div class="pvp-header-actions">
        <div id="pvp-connection-status" class="pvp-connection-chip">Connecting…</div>
        <button id="btn-toggle-dev-config" class="pvp-dev-icon" type="button" aria-label="Dev Config">⋯</button>
      </div>
    </div>

    <div id="pvp-menu-panel" class="pvp-panel">
      <h3 id="pvp-menu-title" class="pvp-panel-title">Duel</h3>
      <div id="pvp-player-meta" class="pvp-meta"></div>
      <button id="btn-pvp-open-create" class="btn-primary pvp-btn">Create Room</button>
      <button id="btn-pvp-open-join" class="btn-secondary pvp-btn">Join Room</button>
    </div>

    <div id="pvp-create-panel" class="pvp-panel" style="display:none">
      <div class="pvp-subheader">
        <button id="btn-pvp-create-back" class="btn-back pvp-mini-back">←</button>
        <h3 id="pvp-create-title" class="pvp-panel-title">Create Room</h3>
      </div>
      <label id="pvp-mode-label" class="pvp-label" for="pvp-mode">Mode</label>
      <select id="pvp-mode" class="input-control">
        <option value="classic">Classic</option>
        <option value="plus_one">+1 Decoy</option>
      </select>

      <label id="pvp-colors-label" class="pvp-label" for="pvp-colors">Colors</label>
      <select id="pvp-colors" class="input-control">
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <label id="pvp-bestof-label" class="pvp-label" for="pvp-bestof">Best Of</label>
      <select id="pvp-bestof" class="input-control">
        <option value="1">Best of 1</option>
        <option value="3" selected>Best of 3</option>
        <option value="5">Best of 5</option>
      </select>
      <div id="pvp-bestof-hint" class="pvp-meta"></div>

      <button id="btn-create-room" class="btn-primary pvp-btn">Create Room</button>
    </div>

    <div id="pvp-join-panel" class="pvp-panel" style="display:none">
      <div class="pvp-subheader">
        <button id="btn-pvp-join-back" class="btn-back pvp-mini-back">←</button>
        <h3 id="pvp-join-title" class="pvp-panel-title">Join Room</h3>
      </div>
      <input id="pvp-room-code" class="input-control code-input" type="text" maxlength="6" placeholder="ROOM CODE" />
      <button id="btn-join-room" class="btn-secondary pvp-btn">Join by Code</button>
    </div>

    <div id="pvp-room-status" class="pvp-panel pvp-status" style="display:none"></div>

    <div id="pvp-dev-config" class="pvp-panel pvp-dev-config" style="display:none">
      <h3 class="pvp-panel-title">Dev Config</h3>
      <input id="supabase-url" class="input-control" type="url" placeholder="Supabase URL" />
      <input id="supabase-anon-key" class="input-control" type="text" placeholder="Supabase anon key" />
      <button id="btn-save-supabase" class="btn-secondary">Save Dev Config</button>
    </div>
  </div>

  <div id="nickname-modal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h3 id="nickname-modal-title" class="pvp-panel-title">Nickname</h3>
      <p id="nickname-modal-subtitle" class="pvp-meta">Add a nickname for PvP</p>
      <input id="nickname-input" class="input-control" type="text" maxlength="20" placeholder="Your nickname" />
      <div class="modal-actions">
        <button id="btn-save-nickname" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- LEVEL SELECT SCREEN -->
  <div id="level-screen" class="screen">
    <div class="screen-header">
      <button id="btn-back-levels" class="btn-back">←</button>
      <h2 id="select-level-title"></h2>
    </div>
    <div id="levels-container" class="levels-container"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button id="btn-back-game" class="btn-back">←</button>
      <div class="game-info">
        <span id="game-level-label" class="game-level"></span>
        <span id="game-attempts" class="game-attempts"></span>
      </div>
      <div id="pvp-competition-card" class="pvp-competition-card" style="display:none">
        <div class="pvp-track-row">
          <span id="pvp-you-label" class="pvp-track-name">You</span>
          <div id="pvp-you-track" class="pvp-track-dots"></div>
        </div>
        <div class="pvp-track-row">
          <span id="pvp-opp-label" class="pvp-track-name">Guest</span>
          <div id="pvp-opp-track" class="pvp-track-dots"></div>
        </div>
      </div>
    </div>

    <div id="history-area" class="history-area"></div>

    <div id="active-row" class="active-row"></div>

    <div class="palette-area">
      <div id="palette-hint" class="palette-label"></div>
      <div id="palette-row" class="palette-row"></div>
    </div>

    <button id="btn-ability" class="btn-ability" style="display:none"></button>
    <button id="btn-confirm" class="btn-confirm" disabled></button>
    <button id="btn-pvp-leave" class="btn-secondary pvp-leave-btn" style="display:none">Leave PVP</button>
  </div>

  <!-- PVP ROUND SCREEN -->
  <div id="pvp-round-screen" class="screen">
    <div class="pvp-round-card">
      <div id="pvp-round-emoji" class="result-emoji">✅</div>
      <h2 id="pvp-round-title" class="result-title">Round cleared</h2>
      <p id="pvp-round-subtitle" class="result-subtitle">Keep going</p>
      <button id="btn-pvp-round-next" class="btn-primary">Next</button>
      <button id="btn-pvp-round-back" class="btn-secondary">Back to PVP</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="result-emoji" id="result-emoji"></div>
    <h2 class="result-title" id="result-title"></h2>
    <p class="result-subtitle" id="result-subtitle"></p>
    <div class="result-answer" id="result-answer"></div>
    <div class="result-buttons">
      <button id="btn-next" class="btn-primary"></button>
      <button id="btn-levels" class="btn-secondary"></button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
